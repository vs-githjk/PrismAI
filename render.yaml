services:
  - type: web
    name: meeting-copilot-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: RECALL_API_KEY
        sync: false
      - key: WEBHOOK_BASE_URL
        value: https://meeting-copilot-api.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.0
